extra_css:
  - style.css
markdown_extensions:
  - smarty
  - toc:
      permalink: true
nav:
  - NEWS.md
plugins:
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
      css_files:
        - style.css
  - search
site_author: AJ
site_description: Lossless Image Optimizer
site_name: Picopt
theme:
  color_mode: dark
  name: mkdocs
  strict: true
